version: '3.8'

services:
  # MongoDB Database Service
  mongodb:
    image: mongo:6.0
    container_name: hospital-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  # Backend Express/Node.js Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hospital-backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - NODE_ENV=production
      - PORT=5001
      - MONGO_URI=${MONGO_URI:-mongodb://mongodb:27017/hospital-management}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:5001}
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-please_change_this_to_a_secure_32_character_string}
      - GEMINI_KEY=${GEMINI_KEY:-your_gemini_api_key_here}
      - UPLOADTHING_TOKEN=${UPLOADTHING_TOKEN:-your_uploadthing_token_here}
      # Add other environment variables here as needed
    depends_on:
      - mongodb

  # Frontend Remix/React Router Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: hospital-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - PORT=3000
      - NODE_ENV=production
    depends_on:
      - backend

volumes:
  mongodb_data:
